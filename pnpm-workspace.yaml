packages:
  - "apps/*"
  - "packages/*"
overrides:
  multer: ^2.2.0
  lodash: ^4.17.24
  qs: ^6.15.2
  uuid: ^11.1.1
  # All three below are transitive via @nestjs/cli (devDependency, build
  # tooling only — never bundled into the running API) — patch-level
  # bumps within the same major line, not a breaking change.
  glob: ^10.5.0
  picomatch: ^4.0.4
  tmp: ^0.2.6
allowBuilds:
  # @firebase/util and protobufjs are transitive deps of firebase-admin
  # (FcmNotificationProvider) — both left as unresolved placeholders
  # previously, which pnpm tolerates against a warm local store but
  # rejects outright under --frozen-lockfile with no store cache (CI).
  '@firebase/util': true
  '@nestjs/core': true
  # @scarf/scarf (via swagger-ui-dist -> @nestjs/swagger) is an install-time
  # analytics/telemetry postinstall, not a native build step — unlike
  # everything else in this list, there's no functional reason to run it.
  # Denied, not approved.
  '@scarf/scarf': false
  argon2: true
  better-sqlite3: true
  electron: true
  protobufjs: true
  # sharp is Next.js 15's native image-optimization dependency — needed
  # for `next build`'s image pipeline, same posture as the others above.
  sharp: true
